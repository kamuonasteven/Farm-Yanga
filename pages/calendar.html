<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar — Farm Yanga</title>
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
</head>
<body>
<div id="toast-container"></div>
<div class="sidebar-overlay" onclick="closeSidebar()"></div>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="hamburger" onclick="toggleSidebar()"><i class="ti ti-menu-2"></i></button>
        <div class="topbar-left"><h1>Farm Calendar</h1><p id="topbar-date"></p></div>
      </div>
      <div class="topbar-right">
        <button class="btn btn-primary btn-sm" onclick="openModal()"><i class="ti ti-plus"></i> Add Event</button>
      </div>
    </header>
    <main class="page-body">
      <div class="two-col">
        <!-- Calendar -->
        <div class="card" style="grid-column:1/3">
          <div class="cal-header">
            <div class="cal-month-label" id="cal-month-label">June 2025</div>
            <div style="display:flex;align-items:center;gap:10px">
              <button class="btn btn-ghost btn-sm" onclick="goToday()">Today</button>
              <div class="cal-nav">
                <button class="cal-nav-btn" onclick="prevMonth()">‹</button>
                <button class="cal-nav-btn" onclick="nextMonth()">›</button>
              </div>
            </div>
          </div>
          <div class="cal-grid" id="cal-grid"></div>
        </div>

        <!-- Upcoming Events -->
        <div class="card">
          <div class="card-header"><div class="card-title"><i class="ti ti-calendar-event"></i> Upcoming Events</div></div>
          <div id="upcoming-events"></div>
        </div>

        <!-- Selected Day Events -->
        <div class="card">
          <div class="card-header">
            <div class="card-title"><i class="ti ti-calendar-day"></i> <span id="selected-day-label">Select a day</span></div>
            <button class="btn btn-primary btn-sm" id="add-day-btn" onclick="openModalForDay()" style="display:none"><i class="ti ti-plus"></i> Add</button>
          </div>
          <div id="day-events"></div>
        </div>
      </div>
    </main>
  </div>
</div>
<div class="modal-overlay hidden" id="ev-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="ev-modal-title">Add Event</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Date *</label><input type="date" id="ev-date"></div>
      <div class="form-group"><label>Color Tag</label>
        <select id="ev-color">
          <option value="green">🟢 Green (Farm task)</option>
          <option value="amber">🟡 Amber (Reminder)</option>
          <option value="blue">🔵 Blue (Meeting/Market)</option>
          <option value="red">🔴 Red (Urgent)</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label>Event Title *</label><input type="text" id="ev-title" placeholder="e.g. Plant maize — Plot A, Buy fertilizer..."></div>
    <div class="form-group"><label>Description / Notes</label><textarea id="ev-desc" placeholder="More details..."></textarea></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEvent()"><i class="ti ti-check"></i> Save Event</button>
    </div>
  </div>
</div>
<script src="../js/app.js"></script>
<script src="../js/sidebar.js"></script>
<script>
if (!Auth.requireAuth()) throw '';
renderSidebar('calendar');
initSidebar('calendar');
setTopbarDate(null, document.getElementById('topbar-date'), '');

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
let curYear = new Date().getFullYear(), curMonth = new Date().getMonth();
let selectedDate = null, editId = null;

function renderCal() {
  const events = getUserData('events');
  const eventMap = {};
  events.forEach(e => { if (!eventMap[e.date]) eventMap[e.date] = []; eventMap[e.date].push(e); });

  document.getElementById('cal-month-label').textContent = MONTHS[curMonth] + ' ' + curYear;
  const firstDay = new Date(curYear, curMonth, 1).getDay();
  const daysInMonth = new Date(curYear, curMonth+1, 0).getDate();
  const daysInPrev = new Date(curYear, curMonth, 0).getDate();
  const today = new Date().toISOString().split('T')[0];

  let html = DAYS.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for (let i=firstDay-1;i>=0;i--) {
    const d = daysInPrev-i;
    const dateStr = `${curYear}-${String(curMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayEvs = eventMap[dateStr]||[];
    html += `<div class="cal-cell other-month" onclick="selectDay('${dateStr}')"><div class="cal-date-num">${d}</div>${dayEvs.slice(0,2).map(e=>`<div class="cal-ev ${e.color}">${e.title}</div>`).join('')}</div>`;
  }
  for (let d=1;d<=daysInMonth;d++) {
    const dateStr = `${curYear}-${String(curMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dateStr===today;
    const isSelected = dateStr===selectedDate;
    const dayEvs = eventMap[dateStr]||[];
    html += `<div class="cal-cell ${isToday?'is-today':''}" style="${isSelected?'outline:2px solid #4caf50;outline-offset:1px':''}" onclick="selectDay('${dateStr}')">
      <div class="cal-date-num">${d}</div>
      ${dayEvs.slice(0,2).map(e=>`<div class="cal-ev ${e.color}">${e.title}</div>`).join('')}
      ${dayEvs.length>2?`<div style="font-size:9px;color:#6b7280">+${dayEvs.length-2} more</div>`:''}
    </div>`;
  }
  const remaining = 42 - firstDay - daysInMonth;
  for (let d=1;d<=remaining;d++) {
    const dateStr = `${curYear}-${String(curMonth+2).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    html += `<div class="cal-cell other-month" onclick="selectDay('${dateStr}')"><div class="cal-date-num">${d}</div></div>`;
  }
  document.getElementById('cal-grid').innerHTML = html;
  renderUpcoming();
}

function selectDay(dateStr) {
  selectedDate = dateStr;
  const events = getUserData('events').filter(e=>e.date===dateStr);
  const d = new Date(dateStr+'T12:00:00');
  document.getElementById('selected-day-label').textContent = d.toLocaleDateString('en-MW',{weekday:'long',month:'long',day:'numeric'});
  document.getElementById('add-day-btn').style.display = 'flex';
  const dayEl = document.getElementById('day-events');
  if (!events.length) {
    dayEl.innerHTML = '<div class="empty-state" style="padding:24px"><i class="ti ti-calendar"></i><h3>No events</h3><p>Click "+ Add" to schedule something for this day</p></div>';
  } else {
    dayEl.innerHTML = '<div class="event-list">' + events.map(e=>`
      <div class="event-item ${e.color}">
        <div><div class="event-title">${e.title}</div><div class="event-desc">${e.desc||''}</div></div>
        <div style="display:flex;gap:4px;margin-left:auto;flex-shrink:0">
          <button class="btn btn-ghost btn-sm" onclick="editEvent('${e.id}')"><i class="ti ti-edit"></i></button>
          <button class="btn btn-danger btn-sm" onclick="delEvent('${e.id}')"><i class="ti ti-trash"></i></button>
        </div>
      </div>`).join('') + '</div>';
  }
  renderCal();
}

function renderUpcoming() {
  const today = new Date().toISOString().split('T')[0];
  const events = getUserData('events').filter(e=>e.date>=today).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,6);
  const el = document.getElementById('upcoming-events');
  if (!events.length) { el.innerHTML = '<div class="empty-state" style="padding:24px"><i class="ti ti-calendar"></i><h3>No upcoming events</h3><p>Add events to plan your farming season</p></div>'; return; }
  el.innerHTML = '<div class="event-list">' + events.map(e=>`
    <div class="event-item ${e.color}" style="cursor:pointer" onclick="selectDay('${e.date}')">
      <div><div class="event-date-lbl">${e.date}</div></div>
      <div><div class="event-title">${e.title}</div><div class="event-desc">${e.desc||''}</div></div>
    </div>`).join('') + '</div>';
}

function prevMonth(){curMonth--;if(curMonth<0){curMonth=11;curYear--;}renderCal();}
function nextMonth(){curMonth++;if(curMonth>11){curMonth=0;curYear++;}renderCal();}
function goToday(){curYear=new Date().getFullYear();curMonth=new Date().getMonth();selectedDate=null;renderCal();}

function openModal(id){
  editId=id||null;
  document.getElementById('ev-modal-title').textContent=editId?'Edit Event':'Add Event';
  if(!editId){document.getElementById('ev-date').value=selectedDate||new Date().toISOString().split('T')[0];document.getElementById('ev-title').value='';document.getElementById('ev-desc').value='';document.getElementById('ev-color').value='green';}
  else{const e=getUserData('events').find(x=>x.id===editId);if(e){document.getElementById('ev-date').value=e.date;document.getElementById('ev-title').value=e.title;document.getElementById('ev-desc').value=e.desc||'';document.getElementById('ev-color').value=e.color||'green';}}
  document.getElementById('ev-modal').classList.remove('hidden');
}
function openModalForDay(){openModal();}
function closeModal(){document.getElementById('ev-modal').classList.add('hidden');editId=null;}
function saveEvent(){
  const date=document.getElementById('ev-date').value,title=document.getElementById('ev-title').value.trim();
  if(!date||!title){toast('Please fill in date and title.','error');return;}
  const entry={id:editId||'ev_'+Date.now(),date,title,desc:document.getElementById('ev-desc').value,color:document.getElementById('ev-color').value};
  let events=getUserData('events');
  if(editId){events=events.map(e=>e.id===editId?entry:e);toast('Event updated!');}
  else{events.push(entry);toast('Event added! 📅');}
  saveUserData('events',events);closeModal();
  if(selectedDate)selectDay(selectedDate);
  else renderCal();
}
function editEvent(id){openModal(id);}
function delEvent(id){if(!confirm('Delete this event?'))return;saveUserData('events',getUserData('events').filter(e=>e.id!==id));toast('Event removed.','warning');if(selectedDate)selectDay(selectedDate);else renderCal();}
function toggleSidebar(){document.querySelector('.sidebar').classList.toggle('open');document.querySelector('.sidebar-overlay').classList.toggle('open');}
function closeSidebar(){document.querySelector('.sidebar').classList.remove('open');document.querySelector('.sidebar-overlay').classList.remove('open');}
renderCal();
</script>
</body>
</html>
